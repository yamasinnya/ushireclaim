<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>やまやま牧場 - マップ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a1506;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  font-family:'Hiragino Kaku Gothic ProN','MS Gothic',sans-serif;
}
#wrap {
  width:100%; max-width:480px;
  display:flex; flex-direction:column;
  min-height:100vh;
}
/* 共通ヘッダー（指示書_共通ヘッダー実装.md対応） */
.game-header {
  width:100%; max-width:480px;
  background: rgba(10, 10, 10, 0.88);
  padding: 6px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #444;
  position: sticky;
  top: 0;
  z-index: 10;
  flex-shrink: 0;
}
.header-date { font-size: 11px; color: #c8c080; letter-spacing: 1px; }
.header-day  { font-size: 10px; color: #708060; }
.header-stats { display: flex; gap: 10px; align-items: center; }
.header-stats span { font-size: 12px; font-weight: bold; }
.stat-mana { color: #90d060; }
.stat-gold { color: #f0d060; }
.stat-wara { color: #e0e0d0; display: flex; align-items: center; gap: 3px; }
.wrap-icon { width: 18px; height: 18px; image-rendering: pixelated; }

/* ヘッダー */
#header {
  background:linear-gradient(135deg,#0f2008,#1e3a10);
  border-bottom:2px solid #6a9020;
  padding:10px 16px 8px;
  display:flex; justify-content:space-between; align-items:center;
  flex-shrink:0;
}
#header h1 { color:#c8a030; font-size:18px; letter-spacing:2px; }
#header .sub { color:#88aa50; font-size:10px; margin-top:2px; }
#header .date { color:#d8c080; font-size:12px; text-align:right; }
/* マップコンテナ */
#map-wrap {
  position:relative; width:100%; flex:1;
  background:#1a2f0a;
  overflow:hidden;
}
#bg-img {
  width:100%; display:block;
}
#map-svg {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
}
.zone-poly {
  cursor:pointer;
}
.zone-icon {
  filter:drop-shadow(0 0.3px 0.6px rgba(0,0,0,0.8));
  transition:transform 0.15s;
  transform-box:fill-box;
  transform-origin:center;
}
.zone-icon:hover {
  transform:scale(1.12);
}
.zone-label {
  pointer-events:none;
  font-size:3px;
  font-weight:bold;
}
/* ダイアログ */
#dialog {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  background:linear-gradient(180deg,#f2e8d0,#ece0c0);
  border-top:3px solid #b8920e;
  padding:14px 18px 20px;
  transition:transform 0.3s ease;
  transform:translateX(-50%) translateY(100%);
  z-index:100;
}
#dialog.open {
  transform:translateX(-50%) translateY(0);
}
#dialog-zone {
  color:#8a6a30; font-size:11px; margin-bottom:4px;
}
#dialog-text {
  color:#1a0f05; font-size:14px; line-height:1.8;
  margin-bottom:12px;
}
#dialog-btn {
  background:linear-gradient(135deg,#2a5010,#3a7018);
  color:#e8f8d0; font-size:13px; font-weight:bold;
  border:none; border-radius:8px; padding:10px 0;
  width:100%; cursor:pointer;
  box-shadow:0 2px 8px #0004;
}
/* バッジ */
#badge {
  position:absolute; bottom:6px; right:8px;
  color:#ff8888aa; font-size:9px; pointer-events:none;
}
</style>
</head>

const svg = document.getElementById('map-svg');

// ゾーンポリゴンを動的生成
ZONES.forEach(z => {
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');

  // ゾーン本体（当たり判定のみ・非表示レイヤー）
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points', z.points);
  poly.setAttribute('fill', 'transparent');
  poly.setAttribute('class', 'zone-poly');
  poly.addEventListener('click', () => openDialog(z));
  g.appendChild(poly);

  // アイコン（生き物 or 牛舎）タップ用の見た目
  const icon = document.createElementNS('http://www.w3.org/2000/svg','image');
  icon.setAttribute('href', z.icon);
  icon.setAttribute('x', z.lx - z.iw/2);
  icon.setAttribute('y', z.ly - z.ih/2);
  icon.setAttribute('width', z.iw);
  icon.setAttribute('height', z.ih);
  icon.setAttribute('class', 'zone-icon');
  icon.style.cursor = 'pointer';
  if (!z.dest) icon.style.opacity = '0.5';
  icon.addEventListener('click', () => openDialog(z));
  g.appendChild(icon);
  if (!z.dest) g.style.filter = 'grayscale(70%)';

  // 番号ラベル（アイコンの上）
  const ts = document.createElementNS('http://www.w3.org/2000/svg','text');
  ts.setAttribute('x', z.lx);
  ts.setAttribute('y', z.ly - z.ih/2 - 1.5);
  ts.setAttribute('text-anchor','middle');
  ts.setAttribute('font-size','3.4');
  ts.setAttribute('font-family','serif');
  ts.setAttribute('fill','#000');
  ts.setAttribute('stroke','#000');
  ts.setAttribute('stroke-width','1.1');
  ts.setAttribute('stroke-linejoin','round');
  ts.setAttribute('class','zone-label');
  ts.textContent = z.num;
  g.appendChild(ts);

  const tf = document.createElementNS('http://www.w3.org/2000/svg','text');
  tf.setAttribute('x', z.lx);
  tf.setAttribute('y', z.ly - z.ih/2 - 1.5);
  tf.setAttribute('text-anchor','middle');
  tf.setAttribute('font-size','3.4');
  tf.setAttribute('font-family','serif');
  tf.setAttribute('fill','#fff');
  tf.setAttribute('class','zone-label');
  tf.textContent = z.num;
  g.appendChild(tf);

  svg.appendChild(g);
});

// ダイアログ
let currentZone = null;
const DEST_BTN_LABEL = {
  'explore.html': '🌿 探索に行く',
  'home.html': '🏠 牧場へ戻る',
};
function openDialog(z) {
  currentZone = z;
  document.getElementById('dialog-zone').textContent = z.num + ' ' + z.name + '（' + z.elev + '）';
  document.getElementById('dialog-text').textContent = z.dialog;
  const goBtn = document.getElementById('dialog-go-btn');
  if (z.dest) {
    goBtn.style.display = 'block';
    goBtn.textContent = DEST_BTN_LABEL[z.dest] || '▶ 進む';
  } else {
    goBtn.style.display = 'none';
  }
  document.getElementById('dialog').classList.add('open');
}
function closeDialog() {
  document.getElementById('dialog').classList.remove('open');
  currentZone = null;
}
function goExplore() {
  if (!currentZone || !currentZone.dest) return;
  location.href = currentZone.dest;
}

// 背景クリックで閉じる
document.getElementById('map-wrap').addEventListener('click', (e) => {
  if (e.target === document.getElementById('bg-img')) closeDialog();
});
</script>
</body>
</html>
