<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>やまやま牧場 - 1日の始まり</title>
<link rel="stylesheet" href="assets/css/common.css">
<style>
.upkeep-text { color:#d8e8c0; font-size:15px; line-height:1.8; margin:8px 0 4px; }
</style>
</head>
<body>

<div id="gameHeader" class="game-header"></div>
<div class="screen-wrap">
  <div class="screen-title" id="title"></div>
  <div class="upkeep-text" id="upkeep-text"></div>
  <button class="btn-main" id="btn-next"></button>
</div>

<script src="assets/js/i18n.js"></script>
<script src="assets/js/common.js"></script>
<script>
(async function () {
  await loadDict();

  const state = loadLoopState();

  // 序盤チュートリアルはtruck_talk.htmlに移譲（指示書_軽トラ会話汎用ページ(truck_talk.html)の実装.md、指示書_3日目チュートリアル（街の説明）.md対応）
  const params = new URLSearchParams(location.search);
  const skipTutorial = params.get('skip_tutorial') === '1';
  const TUTORIAL_SCENE_FOR_DAY = { 2: 'day2_tutorial', 3: 'day3_tutorial', 4: 'day4_tutorial', 5: 'day5_tutorial', 14: 'calf_tutorial', 16: 'breeding_tutorial' };
  const tutorialScene = TUTORIAL_SCENE_FOR_DAY[state.day];
  if (tutorialScene && !skipTutorial) {
    const nextUrl = encodeURIComponent('upkeep.html?skip_tutorial=1');
    location.href = `truck_talk.html?scene=${tutorialScene}&next=${nextUrl}`;
    return;
  }

  // 妊娠確定／着床失敗の通知：種付けから2日後（＝着床判定の翌日）の「1日の始まり」で発火する
  // プレイヤーはこのイベントで初めて結果を知る（着床失敗でも同様。指示書_発情・種付け・妊娠システム実装.md対応）
  const revealingCow = state.cows.find(cow => cow.breedingState === 'inseminated' && cow.inseminatedDay > 0 && state.day === cow.inseminatedDay + 2);
  if (revealingCow && !skipTutorial) {
    const success = revealingCow.pregnantDay > 0;
    revealingCow.breedingState = success ? 'pregnant' : 'failed';
    saveLoopState(state);
    const nextUrl = encodeURIComponent('upkeep.html?skip_tutorial=1');
    location.href = `truck_talk.html?scene=${success ? 'pregnancy_confirmed' : 'pregnancy_failed'}&next=${nextUrl}`;
    return;
  }

  // 出産予定日の確定：pregnantDayが15に達した時点でactualBirthDayをランダム確定（指示書_出産システムの実装.md対応）
  state.cows.forEach(cow => {
    if (cow.pregnantDay === 15 && !cow.actualBirthDay) {
      cow.actualBirthDay = 16 + Math.floor(Math.random() * 5); // 16〜20のランダム
    }
  });

  // 流産判定：立ち会い流産（出産日を過ぎても牛舎に行かなかった）／品質劣による流産リスク（毎日10%）
  // 1頭でも流産したらtruck_talk.htmlで告知して即遷移するため、複数頭が同時該当しても先頭の1頭のみ処理する
  function triggerMiscarriage(cow, reason) {
    cow.pregnantDay = 0;
    cow.actualBirthDay = 0;
    cow.breedingState = 'none'; // 通常の発情待ちループに戻す（指示書_発情・種付け・妊娠システム実装.md対応）
    saveLoopState(state);
    const nextUrl = encodeURIComponent('upkeep.html?skip_tutorial=1');
    location.href = `truck_talk.html?scene=miscarriage&next=${nextUrl}`;
  }
  for (const cow of state.cows) {
    if (cow.pregnantDay > 0 && cow.actualBirthDay > 0 && cow.pregnantDay > cow.actualBirthDay) {
      triggerMiscarriage(cow, 'missed');
      return;
    }
    if (cow.pregnantDay > 0 && cow.quality === 1 && Math.random() < 0.10) {
      triggerMiscarriage(cow, 'quality');
      return;
    }
  }

  // 床替え：3日に1回、母牛の💩を+1（上限4）。4個で品質ポイントも-1（指示書_牛舎実装フェーズ2_床替え.md対応、頻度は口頭で3日に1回と修正）
  if (state.day % 3 === 0) {
    state.cows.forEach(cow => {
      if (cow.type === 'mother') {
        cow.poopCount = Math.min(4, (cow.poopCount || 0) + 1);
      }
    });
  }
  // 💩ペナルティは母牛のみ対象（子牛は床替えシステム対象外。指示書_子牛の成長ステージと特殊ルール実装.md対応）
  state.cows.forEach(cow => {
    if (cow.type !== 'mother') return;
    if (cow.poopCount >= 4) {
      cow.qualityPoint = Math.max(0, (cow.qualityPoint || 0) - 5);
    }
  });

  // 妊娠経過日数を+1（指示書_プロローグ更新版.md追記対応。出産予定日確定・流産判定は上記の出産システム実装対応）
  state.cows.forEach(cow => {
    if (cow.pregnantDay > 0) {
      cow.pregnantDay += 1;
    }
  });

  // 着床判定：種付け実行の翌日に一律80%（指示書_発情・種付け・妊娠システム実装.md対応）
  // 結果はここでは通知しない。プレイヤーへの明示は2日後の妊娠確定/着床失敗イベントで行う（上記のrevealingCow参照）
  state.cows.forEach(cow => {
    if (cow.breedingState === 'inseminated' && cow.inseminatedDay > 0 && state.day === cow.inseminatedDay + 1) {
      if (Math.random() < 0.80) {
        cow.pregnantDay = 1;
      }
      // 失敗時はpregnantDayを0のまま据え置き、breedingStateは'inseminated'を維持する（reveal日まで表示を変えないため）
    }
  });

  // 発情判定：非妊娠・未授精の母牛を対象に、品質ティア別の確率で毎日判定（指示書_発情・種付け・妊娠システム実装.md対応）
  // 発情を逃した（前日発情のまま種付けしなかった）場合は機会が消え、この判定で新しくやり直す。
  // 着床失敗表示('failed')は次の発情が来る（この判定で成功する）まで維持する
  state.cows.forEach(cow => {
    if (cow.type !== 'mother') return;
    if (cow.pregnantDay > 0) return;
    if (cow.breedingState === 'inseminated') return;
    const prob = ESTRUS_PROBABILITY[cow.quality] || 0;
    if (Math.random() < prob) {
      cow.breedingState = 'estrus';
    } else if (cow.breedingState !== 'failed') {
      cow.breedingState = 'none';
    }
  });

  // 子牛の日齢を+1（指示書_子牛の牛舎表示実装.md対応）
  state.cows.forEach(cow => {
    if (cow.type === 'calf') {
      cow.age = (cow.age || 0) + 1;
    }
  });

  saveLoopState(state);
  renderHeader('gameHeader');

  const titleEl = document.getElementById('title');
  const textEl = document.getElementById('upkeep-text');
  const btn = document.getElementById('btn-next');

  // アップキープの通常表示（「発情している」「難産の様子」は本物の発情・妊娠システムと意味が
  // 重複するため削除。口頭指示対応）
  function showUpkeepMain() {
    titleEl.textContent = t('upkeep_title');
    textEl.textContent = t('upkeep_none');
    btn.textContent = t('btn_go_home');
    btn.onclick = () => { location.href = 'home.html'; };
  }

  showUpkeepMain();
})();
</script>

</body>
</html>
