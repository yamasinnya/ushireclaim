<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>やまやま牧場 - 1日の始まり</title>
<link rel="stylesheet" href="assets/css/common.css">
<style>
.upkeep-text { color:#d8e8c0; font-size:15px; line-height:1.8; margin:8px 0 4px; }
</style>
</head>
<body>

<div id="gameHeader" class="game-header"></div>
<div class="screen-wrap">
  <div class="screen-title" id="title"></div>
  <div class="upkeep-text" id="upkeep-text"></div>
  <button class="btn-main" id="btn-next"></button>
</div>

<script src="assets/js/i18n.js"></script>
<script src="assets/js/common.js"></script>
<script>
(async function () {
  await loadDict();

  const state = loadLoopState();

  // 序盤チュートリアルはtruck_talk.htmlに移譲（指示書_軽トラ会話汎用ページ(truck_talk.html)の実装.md、指示書_3日目チュートリアル（街の説明）.md対応）
  const params = new URLSearchParams(location.search);
  const skipTutorial = params.get('skip_tutorial') === '1';
  const TUTORIAL_SCENE_FOR_DAY = { 2: 'day2_tutorial', 3: 'day3_tutorial', 4: 'day4_tutorial' };
  const tutorialScene = TUTORIAL_SCENE_FOR_DAY[state.day];
  if (tutorialScene && !skipTutorial) {
    const nextUrl = encodeURIComponent('upkeep.html?skip_tutorial=1');
    location.href = `truck_talk.html?scene=${tutorialScene}&next=${nextUrl}`;
    return;
  }

  // 床替え：3日に1回、母牛の💩を+1（上限4）。4個で品質ポイントも-1（指示書_牛舎実装フェーズ2_床替え.md対応、頻度は口頭で3日に1回と修正）
  if (state.day % 3 === 0) {
    state.cows.forEach(cow => {
      if (cow.type === 'mother') {
        cow.poopCount = Math.min(4, (cow.poopCount || 0) + 1);
      }
    });
  }
  state.cows.forEach(cow => {
    if (cow.poopCount >= 4) {
      cow.qualityPoint = Math.max(0, (cow.qualityPoint || 0) - 5);
    }
  });

  // 妊娠経過日数を+1（指示書_プロローグ更新版.md追記対応）
  // 「18日到達で出産予定日判定」は既存ロジックが実際には存在しないため、今回は日数カウントのみ実装。
  // 難産イベント判定との接続は別途指示書が必要（下記報告参照）。
  state.cows.forEach(cow => {
    if (cow.pregnantDay > 0) {
      cow.pregnantDay += 1;
    }
  });

  saveLoopState(state);
  renderHeader('gameHeader');

  const titleEl = document.getElementById('title');
  const textEl = document.getElementById('upkeep-text');
  const btn = document.getElementById('btn-next');

  // アップキープイベント判定（if文でベタ書き。JSON化はまだしない）
  // 重み：特になし70% / 発情15% / 難産15%（仮置き。数値イベントは未実装、テキスト表示のみ）
  function showUpkeepMain() {
    const r = Math.random();
    let eventKey;
    if (r < 0.70) {
      eventKey = 'upkeep_none';
    } else if (r < 0.85) {
      eventKey = 'upkeep_heat';
    } else {
      eventKey = 'upkeep_difficult_birth';
    }

    titleEl.textContent = t('upkeep_title');
    textEl.textContent = t(eventKey);
    btn.textContent = t('btn_go_home');
    btn.onclick = () => { location.href = 'home.html'; };
  }

  showUpkeepMain();
})();
</script>

</body>
</html>
