<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>やまやま牧場 - 1日の始まり</title>
<link rel="stylesheet" href="assets/css/common.css">
<style>
.upkeep-text { color:#d8e8c0; font-size:15px; line-height:1.8; margin:8px 0 4px; }
</style>
</head>
<body>

<div id="gameHeader" class="game-header"></div>
<div class="screen-wrap">
  <div class="screen-title" id="title"></div>
  <div class="upkeep-text" id="upkeep-text"></div>
  <button class="btn-main" id="btn-next"></button>
</div>

<script src="assets/js/i18n.js"></script>
<script src="assets/js/common.js"></script>
<script>
(async function () {
  await loadDict();

  // 床替え：3日に1回、母牛の💩を+1（上限4）。4個で品質ポイントも-1（指示書_牛舎実装フェーズ2_床替え.md対応、頻度は口頭で3日に1回と修正）
  const state = loadLoopState();
  if (state.day % 3 === 0) {
    state.cows.forEach(cow => {
      if (cow.type === 'mother') {
        cow.poopCount = Math.min(4, (cow.poopCount || 0) + 1);
      }
    });
  }
  state.cows.forEach(cow => {
    if (cow.poopCount >= 4) {
      cow.qualityPoint = Math.max(0, (cow.qualityPoint || 0) - 5);
    }
  });

  // 妊娠経過日数を+1（指示書_プロローグ更新版.md追記対応）
  // 「18日到達で出産予定日判定」は既存ロジックが実際には存在しないため、今回は日数カウントのみ実装。
  // 難産イベント判定との接続は別途指示書が必要（下記報告参照）。
  state.cows.forEach(cow => {
    if (cow.pregnantDay > 0) {
      cow.pregnantDay += 1;
    }
  });

  saveLoopState(state);
  renderHeader('gameHeader');

  const titleEl = document.getElementById('title');
  const textEl = document.getElementById('upkeep-text');
  const btn = document.getElementById('btn-next');

  // アップキープイベント判定（if文でベタ書き。JSON化はまだしない）
  // 重み：特になし70% / 発情15% / 難産15%（仮置き。数値イベントは未実装、テキスト表示のみ）
  function showUpkeepMain() {
    const r = Math.random();
    let eventKey;
    if (r < 0.70) {
      eventKey = 'upkeep_none';
    } else if (r < 0.85) {
      eventKey = 'upkeep_heat';
    } else {
      eventKey = 'upkeep_difficult_birth';
    }

    titleEl.textContent = t('upkeep_title');
    textEl.textContent = t(eventKey);
    btn.textContent = t('btn_go_home');
    btn.onclick = () => { location.href = 'home.html'; };
  }

  // 2日目チュートリアル（指示書：2日目チュートリアル（スキル・病気説明）対応）
  // イベント判定はチュートリアル終了後に実行し、それまで待機させる
  if (state.day === 2) {
    const QUALITY_LABEL = { 1:'劣', 2:'可', 3:'良', 4:'優' };
    const cowQuality = QUALITY_LABEL[state.cows[0].quality] || '可';
    const TUTORIAL_DAY2_KEYS = [
      'tutorial_day2_00', 'tutorial_day2_01', 'tutorial_day2_02', 'tutorial_day2_03', 'tutorial_day2_04',
      'tutorial_day2_05', 'tutorial_day2_06', 'tutorial_day2_07', 'tutorial_day2_08', 'tutorial_day2_09',
    ];
    let tutorialIndex = 0;
    titleEl.textContent = t('prologue_speaker_truck');

    function showTutorialLine() {
      textEl.textContent = t(TUTORIAL_DAY2_KEYS[tutorialIndex]).replace('{cowQuality}', cowQuality);
      btn.textContent = t('btn_next');
      btn.onclick = () => {
        tutorialIndex++;
        if (tutorialIndex >= TUTORIAL_DAY2_KEYS.length) {
          showUpkeepMain();
        } else {
          showTutorialLine();
        }
      };
    }
    showTutorialLine();
  } else {
    showUpkeepMain();
  }
})();
</script>

</body>
</html>
